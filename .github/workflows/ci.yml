name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (skip private SDK)
        run: npm install --ignore-scripts || true

      - name: Stub private SDK for CI
        run: |
          mkdir -p node_modules/@iflow-ai/iflow-cli-sdk
          echo '{"name":"@iflow-ai/iflow-cli-sdk","version":"0.0.0","main":"index.js"}' > node_modules/@iflow-ai/iflow-cli-sdk/package.json
          echo 'module.exports = { IFlowClient: class {}, MessageType: {}, StopReason: {} };' > node_modules/@iflow-ai/iflow-cli-sdk/index.js

      - name: Build plugin
        run: npm run build

      - name: Verify dist output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "ERROR: dist/index.js not found after build"
            exit 1
          fi
          echo "Build OK: $(du -sh dist/index.js)"
